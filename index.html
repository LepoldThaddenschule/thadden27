<!DOCTYPE html>
<html lang="de">
<head>
<meta http-equiv="content-type" content="text/html; charset=utf-8">
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-title" content="Thadden27">
<title>Thadden27 &middot; Besetzung</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500;1,700&family=Inter:wght@400;500;600&family=Inconsolata:wght@400;500&display=swap');
:root{--bg:#f4f1ec;--sur:#fff;--sur2:#eae6e0;--brd:#c4bbb0;--brd-dk:#96897c;--tx:#0d0b09;--tx-mid:#36322c;--tx-mt:#6a6258;--tx-dim:#9e9288;--acc:#0f2d54;--acc-lt:#1a4a8a;--acc-bg:rgba(15,45,84,.08);--past:#5a2060;--past-bg:rgba(90,32,96,.09);--past-bd:rgba(90,32,96,.32);--now:#124a2e;--now-bg:rgba(18,74,46,.09);--now-bd:rgba(18,74,46,.32);--sw:272px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);font-size:13.5px;line-height:1.55;display:flex;flex-direction:column;height:100%;overflow:hidden;}
#topbar{background:var(--acc);padding:0 22px;display:flex;align-items:center;gap:10px;flex-shrink:0;height:60px;}
.brand{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:#fff;letter-spacing:.05em;margin-right:2px;white-space:nowrap;cursor:pointer;line-height:1;}
.brand:hover{opacity:.85;}
.brand-sub{font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);white-space:nowrap;align-self:flex-end;padding-bottom:3px;}
.tb{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:5px 12px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;letter-spacing:.04em;color:rgba(255,255,255,.9);cursor:pointer;white-space:nowrap;}
.tb:hover{background:rgba(255,255,255,.2);}
.tb.ghost{background:none;border-color:rgba(255,255,255,.18);color:rgba(255,255,255,.6);}
.tb.ghost:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9);}
#status{flex:1;font-family:'Inconsolata',monospace;font-size:11px;color:rgba(255,255,255,.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#status.ok{color:rgba(255,255,255,.8);}
#status.err{color:#f5a0a0;}
#loader{display:none;position:fixed;inset:0;background:rgba(15,45,84,.6);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#loader.on{display:flex;}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loader p{color:rgba(255,255,255,.8);font-size:13px;font-weight:500;}
#fbar{background:var(--acc-bg);border-bottom:1.5px solid rgba(15,45,84,.14);padding:5px 22px;display:none;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;}
#fbar.on{display:flex;}
#fbar-chips{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.fchip{font-size:11px;font-weight:600;color:var(--acc);padding:1px 9px;border-radius:10px;border:1.5px solid rgba(15,45,84,.28);background:var(--acc-bg);}
.fclear{background:none;border:1.5px solid rgba(15,45,84,.28);border-radius:4px;padding:2px 9px;font-size:10.5px;color:var(--acc);cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;}
#body-wrap{display:flex;flex:1;min-height:0;overflow:hidden;}
#sidebar{width:var(--sw);min-width:var(--sw);background:var(--sur);border-right:1.5px solid var(--brd);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
#sb-top{padding:12px 16px 10px;background:var(--acc);flex-shrink:0;position:relative;display:flex;align-items:center;gap:10px;}
#mob-close-btn{display:none;align-items:center;justify-content:center;width:28px;height:28px;background:rgba(255,255,255,.15);border:none;border-radius:4px;color:#fff;font-size:15px;cursor:pointer;}
.sb-top-lbl{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.55);}
#zeit-block{padding:13px 18px 11px;border-bottom:2px solid var(--brd);background:var(--sur2);flex-shrink:0;}
.sb-lbl{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--tx-dim);margin-bottom:8px;}
.zb{display:flex;align-items:center;gap:8px;background:none;border:1.5px solid transparent;border-radius:5px;padding:7px 10px;font-family:'Inter',sans-serif;font-size:12.5px;color:var(--tx-mt);cursor:pointer;text-align:left;width:100%;margin-bottom:3px;}
.pip{width:8px;height:8px;border-radius:50%;flex-shrink:0;opacity:.3;}
.zb[data-z="alle"] .pip{background:var(--brd-dk);}
.zb[data-z="vergangenheit"] .pip{background:var(--past);}
.zb[data-z="gegenwart"] .pip{background:var(--now);}
.zb:hover{background:rgba(0,0,0,.04);color:var(--tx);}
.zb.on{border-color:var(--brd);background:var(--sur);color:var(--tx-mid);font-weight:500;}
.zb.on .pip{opacity:1;}
.zb[data-z="vergangenheit"].on{background:var(--past-bg);border-color:var(--past-bd);color:var(--past);}
.zb[data-z="gegenwart"].on{background:var(--now-bg);border-color:var(--now-bd);color:var(--now);}
.ens-hdr-row{padding:11px 18px 6px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;}
.ens-hdr-lbl{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--tx-dim);}
.alle-btn{background:none;border:1.5px solid var(--brd);border-radius:4px;padding:3px 9px;font-family:'Inter',sans-serif;font-size:10px;font-weight:600;color:var(--tx-mt);cursor:pointer;}
.alle-btn.on{background:var(--acc);border-color:var(--acc);color:#fff;}
#leit-block{border-bottom:2px solid var(--brd);flex-shrink:0;}
.leit-btn{display:flex;align-items:center;gap:6px;width:100%;background:none;border:none;padding:6px 16px 6px 12px;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;color:var(--tx-mid);text-align:left;border-left:3px solid transparent;border-bottom:1px solid rgba(0,0,0,.04);}
.leit-btn:hover{color:var(--tx);background:rgba(0,0,0,.03);}
.leit-btn.on{font-weight:600;color:var(--acc);border-left-color:var(--acc);background:var(--acc-bg);}
.leit-chk{width:13px;height:13px;margin-left:auto;border:1.5px solid var(--brd-dk);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:transparent;}
.leit-btn.on .leit-chk{background:var(--acc);border-color:var(--acc);color:#fff;}
#ens-wrap{flex:1;overflow-y:auto;}
.ens-btn{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;padding:7px 16px 7px 12px;cursor:pointer;font-family:'Inter',sans-serif;font-size:12.5px;color:var(--tx-mid);text-align:left;border-left:3px solid transparent;border-bottom:1px solid rgba(0,0,0,.04);}
.ens-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.chk{width:14px;height:14px;margin-left:auto;border:1.5px solid var(--brd-dk);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;}
.ens-btn:hover{color:var(--tx);background:rgba(0,0,0,.03);}
.ens-btn.on{font-weight:600;}
.ens-btn.on .chk{color:#fff;}
#main{flex:1;overflow-y:auto;min-width:0;display:flex;flex-direction:column;}
#vlist,#vdetail{display:flex;flex-direction:column;flex:1;}
#vdetail{display:none;}
#lcontent{padding:26px 30px;max-width:1000px;}
.akt-h{display:flex;align-items:center;gap:14px;margin:32px 0 12px;}
.akt-h:first-child{margin-top:0;}
.akt-rule{flex:1;height:1.5px;background:var(--brd);}
.akt-nm{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;font-style:italic;color:var(--tx-mt);white-space:nowrap;}
.pause-block{display:flex;align-items:center;justify-content:center;margin:20px 0;border-radius:8px;overflow:hidden;background:linear-gradient(90deg,#c4923500 0%,#c49235bb 25%,#c49235bb 75%,#c4923500 100%);border:1.5px solid rgba(196,146,53,0.4);min-height:52px;position:relative;}
.pause-block::before{content:'\2014';position:absolute;left:28px;font-size:14px;color:rgba(196,146,53,0.45);}
.pause-block::after{content:'\2014';position:absolute;right:28px;font-size:14px;color:rgba(196,146,53,0.45);}
.pause-inner{display:flex;align-items:center;padding:12px 60px;}
.pause-line{display:none;}
.pause-badge{display:none;}
.pause-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;font-weight:600;color:#7a5c10;letter-spacing:.04em;}
.pause-block.greyed{opacity:.2;}
.hb{margin-bottom:5px;border:1.5px solid var(--brd);border-radius:7px;background:var(--sur);overflow:hidden;transition:opacity .15s,border-color .15s;}
.hb.greyed{opacity:.18;}
.hb.hz{opacity:.15;}
.hb.lit{border-color:var(--acc);border-left-width:4px;}
.hh{padding:10px 12px 10px 14px;transition:background .1s;}
.hh:hover{background:var(--sur2);}
.hh-r1{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.hh-r2{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;}
.hh-r2:empty{display:none;}
.hnum{font-family:'Inconsolata',monospace;font-size:13px;font-weight:500;color:var(--acc);min-width:34px;flex-shrink:0;}
.hname{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;flex:1;min-width:80px;}
.hname:hover{color:var(--acc);text-decoration:underline;text-underline-offset:3px;}
.zpill{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:10px;border:1.5px solid;flex-shrink:0;white-space:nowrap;}
.zpill.vergangenheit{color:var(--past);border-color:var(--past-bd);background:var(--past-bg);}
.zpill.gegenwart{color:var(--now);border-color:var(--now-bd);background:var(--now-bg);}
.leit-tag{font-family:'Inter',sans-serif;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;color:var(--acc-lt);background:rgba(26,74,138,.08);border:1.5px solid rgba(26,74,138,.25);}
.leit-tag.leit-dim{opacity:.3;}
.leit-detail{font-size:12px;font-weight:500;color:var(--acc);background:var(--acc-bg);border:1.5px solid rgba(15,45,84,.2);border-radius:5px;padding:3px 10px;display:inline-flex;align-items:center;gap:4px;}
.arr{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--brd-dk);cursor:pointer;border-radius:4px;transition:transform .2s;}
.arr:hover{background:var(--sur2);}
.hb.open .marr{transform:rotate(90deg);}
.ub.open .uarr{transform:rotate(90deg);}
.etag{font-family:'Inconsolata',monospace;font-size:10.5px;font-weight:500;padding:1px 7px;border-radius:4px;white-space:nowrap;border:1.5px solid;}
.etags{display:flex;flex-wrap:wrap;gap:4px;}
.uc{border-top:1.5px solid var(--brd);background:#faf8f5;overflow:hidden;max-height:0;transition:max-height .3s ease;}
.hb.open .uc{max-height:8000px;}
.ub{border-bottom:1px solid rgba(0,0,0,.06);overflow:hidden;}
.ub:last-child{border-bottom:none;}
.ub.hidden-ub{display:none;}
.ub.greyed-ub{opacity:.2;}
.uh-r1{display:flex;align-items:center;gap:10px;padding:8px 12px 8px 20px;flex-wrap:wrap;}
.uh-r2{display:flex;flex-wrap:wrap;gap:4px;padding:0 12px 6px 20px;}
.uh-r2:empty{display:none;}
.unum{font-family:'Inconsolata',monospace;font-size:11.5px;color:var(--tx-dim);min-width:44px;flex-shrink:0;}
.uname{flex:1;min-width:60px;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--tx-mid);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.uname:hover{color:var(--acc);text-decoration:underline;}
.uuc{background:#f4f2ee;overflow:hidden;max-height:0;transition:max-height .25s ease;}
.ub.open .uuc{max-height:4000px;}
.uur{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:7px 12px 7px 36px;border-bottom:1px solid rgba(0,0,0,.04);}
.uur:last-child{border-bottom:none;}
.uur.hidden-uur{display:none;}
.uur.greyed-uur{opacity:.2;}
.uurnum{font-family:'Inconsolata',monospace;font-size:10.5px;color:var(--tx-dim);min-width:54px;flex-shrink:0;}
.uurname{font-family:'Cormorant Garamond',serif;font-size:14.5px;color:var(--tx-mt);cursor:pointer;flex:1;}
.uurname:hover{color:var(--acc);text-decoration:underline;}
#dcontent{padding:28px 32px;max-width:860px;}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1.5px solid var(--brd);border-radius:5px;padding:6px 13px;font-family:'Inter',sans-serif;font-size:11.5px;font-weight:500;color:var(--tx-mid);cursor:pointer;margin-bottom:22px;}
.back-btn:hover{border-color:var(--brd-dk);background:var(--sur2);}
.dheader{border-bottom:2px solid var(--brd);padding-bottom:16px;margin-bottom:22px;}
.dnum{font-family:'Inconsolata',monospace;font-size:13px;font-weight:500;color:var(--acc);margin-bottom:4px;}
.dtitle{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:700;font-style:italic;color:var(--tx);line-height:1.1;margin-bottom:8px;}
.sec-h{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--tx-dim);margin:24px 0 10px;}
.dsub{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1.5px solid var(--brd);border-radius:6px;background:var(--sur);margin-bottom:5px;cursor:pointer;}
.dsub:hover{border-color:var(--acc);background:var(--acc-bg);}
.dsub-num{font-family:'Inconsolata',monospace;font-size:11.5px;color:var(--acc);min-width:48px;}
.dsub-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;color:var(--tx);flex:1;}
.file-card{border:1.5px solid var(--brd);border-radius:8px;background:var(--sur);overflow:hidden;margin-bottom:12px;}
.file-card-head{padding:11px 16px;border-bottom:1px solid var(--brd);background:var(--sur2);font-size:13px;font-weight:600;color:var(--tx);}
.file-card-body{padding:14px 16px;display:flex;flex-direction:column;gap:10px;}
.ntabs{display:flex;border-bottom:1.5px solid var(--brd);}
.ntab{flex:1;padding:9px 6px;background:var(--sur2);border:none;border-right:1px solid var(--brd);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;color:var(--tx-mt);cursor:pointer;text-align:center;}
.ntab:last-child{border-right:none;}
.ntab.on{background:var(--sur);color:var(--tx);}
.ntab-body{display:none;padding:12px 16px;}
.ntab-body.on{display:block;}
.file-list{display:flex;flex-direction:column;gap:5px;margin-bottom:4px;}
.file-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:5px;background:var(--sur2);border:1px solid var(--brd);}
.file-nm{flex:1;font-size:12px;color:var(--tx-mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-row a{font-size:11px;color:var(--acc);text-decoration:none;font-weight:500;flex-shrink:0;}
.file-row a:hover{text-decoration:underline;}
.file-del{background:none;border:none;color:var(--tx-dim);cursor:pointer;font-size:13px;padding:0 2px;flex-shrink:0;}
.audio-item{border:1px solid var(--brd);border-radius:6px;background:var(--sur2);padding:8px 10px;}
.audio-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.audio-nm{font-size:11.5px;font-weight:500;color:var(--tx-mid);flex:1;}
audio{width:100%;height:36px;border-radius:4px;display:block;}
.upload-area{margin-top:8px;display:flex;align-items:center;gap:8px;flex-wrap:wrap;}
.upload-main-btn{display:inline-flex;align-items:center;gap:7px;background:var(--acc);border:none;border-radius:6px;padding:8px 16px;font-family:'Inter',sans-serif;font-size:12px;font-weight:600;color:#fff;cursor:pointer;transition:background .12s;white-space:nowrap;}
.upload-main-btn:hover{background:var(--acc-lt);}
.upload-main-btn:disabled{opacity:.5;cursor:not-allowed;}
.upload-progress{font-size:11px;color:var(--acc);font-weight:500;display:none;}
.upload-progress.on{display:inline-flex;align-items:center;gap:5px;}
.upload-spinner{width:12px;height:12px;border:2px solid rgba(15,45,84,.2);border-top-color:var(--acc);border-radius:50%;animation:spin .7s linear infinite;flex-shrink:0;}
#mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:29;}
#mob-overlay.on{display:block;}
#mob-filter-btn{display:none;}
@media(max-width:860px){
  #sidebar{position:fixed;left:0;top:0;height:100%;transform:translateX(-100%);transition:transform .28s ease;z-index:30;box-shadow:4px 0 24px rgba(0,0,0,.2);}
  #sidebar.open{transform:translateX(0);}
  #mob-filter-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:5px 11px;color:#fff;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;}
  #mob-close-btn{display:flex;}
  #lcontent{padding:16px 14px 60px;}
  #dcontent{padding:16px 14px 60px;}
  .hname{white-space:normal;font-size:16px;line-height:1.3;}
  .uname{white-space:normal;font-size:14px;}
  .brand-sub{display:none;}
}
@media(max-width:520px){
  #sidebar{top:auto;bottom:0;width:100%;max-height:82dvh;border-radius:16px 16px 0 0;transform:translateY(100%);}
  #sidebar.open{transform:translateY(0);}
  .hb .zpill,.ub .zpill{display:none;}
  #lcontent{padding:12px 10px 80px;}
  #dcontent{padding:12px 10px 80px;}
  .dtitle{font-size:26px;}
}
::-webkit-scrollbar{width:5px;}
::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px;}
</style>
</head>
<body>
<div id="mob-overlay" onclick="closeSB()"></div>
<div id="loader"><div class="spinner"></div><p id="loader-msg">Lade&hellip;</p></div>
<div id="topbar">
  <span class="brand" onclick="showList()" title="Zur Übersicht">Thadden27</span>
  <span class="brand-sub">Besetzung</span>
  <span id="status">Lädt&hellip;</span>
  <button class="tb ghost" id="btn-col" onclick="collapseAll(true)"  style="display:none">Einklappen</button>
  <button class="tb ghost" id="btn-exp" onclick="collapseAll(false)" style="display:none">Aufklappen</button>
  <button id="mob-filter-btn" onclick="openSB()">&#9776; Filter</button>
</div>
<div id="fbar">
  <div id="fbar-chips"></div>
  <button class="fclear" onclick="clearAllFilters()">&#10005; Filter zurücksetzen</button>
</div>
<div id="body-wrap">
  <div id="sidebar">
    <div id="sb-top">
      <button id="mob-close-btn" onclick="closeSB()">&#10005;</button>
      <span class="sb-top-lbl">Filter</span>
    </div>
    <div id="zeit-block">
      <div class="sb-lbl">Zeitebene</div>
      <button class="zb on" data-z="alle"          onclick="setZ(this)"><span class="pip"></span>Alle Zeiten</button>
      <button class="zb"    data-z="vergangenheit" onclick="setZ(this)"><span class="pip"></span>Vergangenheit</button>
      <button class="zb"    data-z="gegenwart"     onclick="setZ(this)"><span class="pip"></span>Gegenwart</button>
    </div>
    <div id="leit-block">
      <div class="ens-hdr-row">
        <span class="ens-hdr-lbl">Mus. Leitung</span>
        <button class="alle-btn" id="leit-alle-btn" onclick="clearLeit()" style="display:none">&#9745; Alle</button>
      </div>
      <div id="leit-list"><div style="padding:8px 18px 10px;font-size:11.5px;color:var(--tx-dim);">Wird geladen&hellip;</div></div>
    </div>
    <div id="ens-wrap">
      <div class="ens-hdr-row">
        <span class="ens-hdr-lbl">Ensembles</span>
        <button class="alle-btn on" id="alle-btn" onclick="selAll()">&#9745; Alle</button>
      </div>
      <div id="ens-list"><div style="padding:16px 18px;font-size:12px;color:var(--tx-dim);line-height:1.7;">Wird geladen&hellip;</div></div>
    </div>
    <div style="padding:10px 14px;border-top:1px solid var(--brd);flex-shrink:0;">
      <button onclick="resetGhToken()" style="width:100%;background:none;border:1px solid var(--brd);border-radius:4px;padding:6px 10px;font-family:'Inter',sans-serif;font-size:10.5px;color:var(--tx-dim);cursor:pointer;text-align:center;">
        &#128273; GitHub Token zur&uuml;cksetzen
      </button>
    </div>
  </div>
  <div id="main">

// GitHub API: Datei hochladen (erstellt oder ersetzt)
function ghUpload(path, fileObj, onDone, onErr) {
  var reader = new FileReader();
  reader.onload = function(e) {
    var bytes = new Uint8Array(e.target.result);
    var binary = '';
    for (var i = 0; i < bytes.byteLength; i++) binary += String.fromCharCode(bytes[i]);
    var b64 = btoa(binary);
    var apiUrl = 'https://api.github.com/repos/' + GH_OWNER + '/' + GH_REPO + '/contents/' +
                 encodeURIComponent(path).replace(/%2F/g, '/');

    function doUpload(attempt) {
      // Immer frische SHA holen direkt vor dem PUT (verhindert Konflikte)
      fetch(apiUrl, {headers:{'Authorization':'token '+_ghToken,'Accept':'application/vnd.github.v3+json'}})
        .then(function(r){ return r.ok ? r.json() : null; })
        .then(function(existing){
          var body = {message:'Upload: '+path, content:b64, branch:GH_BRANCH};
          if (existing && existing.sha) body.sha = existing.sha;
          return fetch(apiUrl, {
            method:'PUT',
            headers:{'Authorization':'token '+_ghToken,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
            body:JSON.stringify(body)
          });
        })
        .then(function(r){
          if (r.status === 409 && attempt < 3) {
            // SHA-Konflikt: kurz warten und nochmal versuchen
            setTimeout(function(){ doUpload(attempt+1); }, 800 * attempt);
            return null;
          }
          if (!r.ok) return r.json().then(function(d){ throw new Error(d.message || r.status); });
          return r.json();
        })
        .then(function(data){
          if (!data) return; // Retry laeuft noch
          var url = 'https://raw.githubusercontent.com/'+GH_OWNER+'/'+GH_REPO+'/'+GH_BRANCH+'/'+path;
          onDone(url);
        })
        .catch(function(err){
          if (err.message && (err.message.indexOf('401')>=0 || err.message.indexOf('Bad credentials')>=0)) {
            localStorage.removeItem('gh_token'); _ghToken=null;
            alert('GitHub Token ung\xfcltig. Beim n\xe4chsten Upload neu eingeben.');
          }
          onErr(err.message || 'Unbekannter Fehler');
        });
    }
    doUpload(1);
  };
  reader.readAsArrayBuffer(fileObj);
}

// dateien.json nach Upload aktualisieren
// Manifest-Schreibwarteschlange – verhindert SHA-Konflikte bei mehreren Uploads
var _manifestQueue = [];
var _manifestBusy  = false;

function ghUpdateManifest(sid, type, cat, filePath) {
  _manifestQueue.push({sid:sid, type:type, cat:cat, path:filePath, remove:false});
  _runManifestQueue();
}

function ghDeleteFromManifest(sid, type, cat, filePath) {
  if(!_ghToken) return;
  _manifestQueue.push({sid:sid, type:type, cat:cat, path:filePath, remove:true});
  _runManifestQueue();
}

function _runManifestQueue() {
  if (_manifestBusy || !_manifestQueue.length || !_ghToken) return;
  _manifestBusy = true;
  var job = _manifestQueue.shift();
  var mUrl = 'https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/dateien.json';

  function attempt(retries) {
    fetch(mUrl, {headers:{'Authorization':'token '+_ghToken,'Accept':'application/vnd.github.v3+json'}})
      .then(function(r){ return r.ok ? r.json() : {content:'e30=', sha:null}; })
      .then(function(existing){
        var raw = atob(existing.content.replace(/\n/g,''));
        var manifest = {};
        try { manifest = JSON.parse(raw); } catch(e) {}

        if (!manifest[job.sid]) manifest[job.sid] = {noten:{o:[],c:[],s:[]},audio:[]};

        if (job.remove) {
          if (job.type==='pdf' && manifest[job.sid].noten && manifest[job.sid].noten[job.cat]) {
            manifest[job.sid].noten[job.cat] = manifest[job.sid].noten[job.cat].filter(function(p){return p!==job.path;});
          } else if (job.type==='audio' && manifest[job.sid].audio) {
            manifest[job.sid].audio = manifest[job.sid].audio.filter(function(p){return p!==job.path;});
          }
        } else {
          if (job.type==='pdf') {
            if (!manifest[job.sid].noten) manifest[job.sid].noten={o:[],c:[],s:[]};
            if (!manifest[job.sid].noten[job.cat]) manifest[job.sid].noten[job.cat]=[];
            if (manifest[job.sid].noten[job.cat].indexOf(job.path)<0) manifest[job.sid].noten[job.cat].push(job.path);
          } else {
            if (!manifest[job.sid].audio) manifest[job.sid].audio=[];
            if (manifest[job.sid].audio.indexOf(job.path)<0) manifest[job.sid].audio.push(job.path);
          }
        }

        var nc = btoa(unescape(encodeURIComponent(JSON.stringify(manifest,null,2))));
        var body = {message:(job.remove?'Delete: ':'Update: ')+job.path, content:nc, branch:GH_BRANCH};
        if (existing.sha) body.sha = existing.sha;
        return fetch(mUrl, {
          method:'PUT',
          headers:{'Authorization':'token '+_ghToken,'Accept':'application/vnd.github.v3+json','Content-Type':'application/json'},
          body:JSON.stringify(body)
        });
      })
      .then(function(r){
        if (r && r.status===409 && retries<4) {
          // SHA-Konflikt: Datei wurde gerade von jemand anderem geaendert – nochmal
          setTimeout(function(){ attempt(retries+1); }, 600 * retries);
          return;
        }
        _manifestBusy = false;
        _runManifestQueue(); // naechsten Job starten
      })
      .catch(function(e){
        console.warn('dateien.json update failed:', e);
        _manifestBusy = false;
        _runManifestQueue();
      });
  }
  attempt(1);
}

function loadManifest(){
  // Strategie 1: GitHub API (immer aktuell, kein CDN-Cache)

  function applyManifest(data){
    if(!data)return;
    for(var sid in data){
      var e=data[sid],f=gf(sid);
      if(e.noten){['o','c','s'].forEach(function(k){
        if(e.noten[k])e.noten[k].forEach(function(path){
          var p=path.split('/');
          // Absolute URL erzeugen damit es unabhaengig vom Cache-Stand funktioniert
          var absUrl = path.indexOf('http')===0 ? path :
            'https://raw.githubusercontent.com/'+GH_OWNER+'/'+GH_REPO+'/'+GH_BRANCH+'/'+path;
          f.noten[k].push({name:p[p.length-1],url:absUrl,ghPath:path.indexOf('http')===0?'':path});
        });
      });}
      if(e.audio)e.audio.forEach(function(path){
        var p=path.split('/');
        var absUrl = path.indexOf('http')===0 ? path :
          'https://raw.githubusercontent.com/'+GH_OWNER+'/'+GH_REPO+'/'+GH_BRANCH+'/'+path;
        f.audio.push({name:p[p.length-1],url:absUrl,ghPath:path.indexOf('http')===0?'':path});
      });
    }
    render();
  }

  // Versuche zuerst GitHub API (frisch, kein Cache) wenn Token vorhanden
  var tok = localStorage.getItem('gh_token');
  if(tok && GH_OWNER !== 'DEIN-GITHUB-NAME'){
    var apiUrl='https://api.github.com/repos/'+GH_OWNER+'/'+GH_REPO+'/contents/dateien.json';
    fetch(apiUrl,{headers:{'Authorization':'token '+tok,'Accept':'application/vnd.github.v3+json'}})
      .then(function(r){return r.ok?r.json():null;})
      .then(function(d){
        if(d&&d.content){
          var raw=atob(d.content.replace(/\n/g,''));
          try{applyManifest(JSON.parse(raw));}catch(e){}
        }else{
          // Fallback: direkter Fetch mit Cache-Busting
          fetchManifestDirect();
        }
      })
      .catch(fetchManifestDirect);
  }else{
    fetchManifestDirect();
  }

  function fetchManifestDirect(){
    // Cache-Busting per Timestamp-Parameter
    var cb='?t='+Date.now();
    fetch('dateien.json'+cb)
      .then(function(r){return r.ok?r.json():null;})
      .then(applyManifest)
      .catch(function(){});
  }
}

function mkDZ(type,sid,k,listEl){
  var wrap=document.createElement('div');wrap.className='upload-area';

  var inp=document.createElement('input');
  inp.type='file';inp.multiple=true;
  inp.accept=type==='pdf'?'.pdf,application/pdf':'.mp3,.m4a,.ogg,.wav,audio/*';
  inp.style.display='none';
  wrap.appendChild(inp);

  var btn=document.createElement('button');
  btn.className='upload-main-btn';
  btn.innerHTML=(type==='pdf'?'\uD83D\uDCC4':'&#127925;')+' '+(type==='pdf'?'Noten hochladen':'Audio hochladen');
  btn.onclick=function(){
    if(!checkAuth())return;
    inp.click();
  };
  wrap.appendChild(btn);

  var prog=document.createElement('span');
  prog.className='upload-progress';
  prog.innerHTML='<span class="upload-spinner"></span><span class="prog-txt">wird hochgeladen\u2026</span>';
  wrap.appendChild(prog);

  inp.onchange=function(e){
    var files=e.target.files;
    if(!files||!files.length){e.target.value='';return;}
    btn.disabled=true;
    prog.classList.add('on');
    var total=files.length,done=0;
    function onOne(){done++;prog.querySelector('.prog-txt').textContent=done+'/'+total+' hochgeladen';if(done>=total){btn.disabled=false;prog.classList.remove('on');}}
    hFiles(files,type,sid,k,listEl,onOne);
    e.target.value='';
  };
  return wrap;
}
function hFiles(files,type,sid,k,listEl,onEachDone){
  if(!files||!files.length)return;
  for(var i=0;i<files.length;i++){
    (function(f){
      // Folder: noten/szene-ID-kat/ or audio/szene-ID/
      var folder = type==='pdf'
        ? 'noten/'+sid+'-'+k+'/'
        : 'audio/'+sid+'/';
      var ghPath = folder + f.name;

      // Optimistisch anzeigen (temporaere URL)
      var tempUrl = URL.createObjectURL(f);
      var entry = {name:f.name, url:tempUrl, local:true, uploading:true, ghPath:ghPath};
      if(type==='pdf') gf(sid).noten[k].push(entry);
      else             gf(sid).audio.push(entry);
      if(type==='pdf') rPdfs(listEl,sid,k);
      else             rAudio(listEl,sid);

      // Hochladen nach GitHub
      ghUpload(ghPath, f,
        function(permanentUrl){
          // URL auf permanente raw.githubusercontent.com URL setzen
          entry.url = permanentUrl;
          entry.local = false;
          entry.uploading = false;
          ghUpdateManifest(sid, type, k, ghPath);
          if(type==='pdf') rPdfs(listEl,sid,k);
          else             rAudio(listEl,sid);
          setSt('Hochgeladen: ' + f.name, true);
          if(onEachDone) onEachDone();
        },
        function(errMsg){
          entry.uploading = false;
          entry.error = true;
          alert('Upload fehlgeschlagen: ' + errMsg + '\n\nDatei ist nur bis zum Browser-Neustart verfuegbar.');
          if(type==='pdf') rPdfs(listEl,sid,k);
          else             rAudio(listEl,sid);
          if(onEachDone) onEachDone();
        }
      );
    })(files[i]);
  }
}
