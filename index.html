<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-capable" content="yes">
<title>Thadden27 &middot; Besetzung</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,500;0,700;1,500;1,700&family=Inter:wght@400;500;600&family=Inconsolata:wght@400;500&display=swap');
:root{--bg:#f4f1ec;--sur:#fff;--sur2:#eae6e0;--brd:#c4bbb0;--brd-dk:#96897c;--tx:#0d0b09;--tx-mid:#36322c;--tx-mt:#6a6258;--tx-dim:#9e9288;--acc:#0f2d54;--acc-lt:#1a4a8a;--acc-bg:rgba(15,45,84,.08);--past:#5a2060;--past-bg:rgba(90,32,96,.09);--past-bd:rgba(90,32,96,.32);--now:#124a2e;--now-bg:rgba(18,74,46,.09);--now-bd:rgba(18,74,46,.32);--sw:272px;}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0;}
html,body{height:100%;}
body{font-family:'Inter',sans-serif;background:var(--bg);color:var(--tx);font-size:13.5px;line-height:1.55;display:flex;flex-direction:column;height:100%;overflow:hidden;}
#topbar{background:var(--acc);padding:0 22px;display:flex;align-items:center;gap:10px;flex-shrink:0;height:60px;}
.brand{font-family:'Cormorant Garamond',serif;font-size:26px;font-weight:700;color:#fff;letter-spacing:.05em;margin-right:2px;white-space:nowrap;cursor:pointer;line-height:1;}
.brand:hover{opacity:.85;}
.brand-sub{font-size:9px;font-weight:500;letter-spacing:.2em;text-transform:uppercase;color:rgba(255,255,255,.5);white-space:nowrap;align-self:flex-end;padding-bottom:3px;}
.tb{background:rgba(255,255,255,.12);border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:5px 12px;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;color:rgba(255,255,255,.9);cursor:pointer;white-space:nowrap;}
.tb:hover{background:rgba(255,255,255,.2);}
.tb.ghost{background:none;border-color:rgba(255,255,255,.18);color:rgba(255,255,255,.6);}
.tb.ghost:hover{background:rgba(255,255,255,.08);color:rgba(255,255,255,.9);}
#status{flex:1;font-family:'Inconsolata',monospace;font-size:11px;color:rgba(255,255,255,.5);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
#status.ok{color:rgba(255,255,255,.8);}#status.err{color:#f5a0a0;}
#loader{display:none;position:fixed;inset:0;background:rgba(15,45,84,.6);z-index:100;align-items:center;justify-content:center;flex-direction:column;gap:16px;}
#loader.on{display:flex;}
.spinner{width:40px;height:40px;border:3px solid rgba(255,255,255,.2);border-top-color:#fff;border-radius:50%;animation:spin .8s linear infinite;}
@keyframes spin{to{transform:rotate(360deg);}}
#loader p{color:rgba(255,255,255,.8);font-size:13px;font-weight:500;}
#fbar{background:var(--acc-bg);border-bottom:1.5px solid rgba(15,45,84,.14);padding:5px 22px;display:none;align-items:center;gap:8px;flex-wrap:wrap;flex-shrink:0;}
#fbar.on{display:flex;}
#fbar-chips{display:flex;gap:5px;flex-wrap:wrap;flex:1;}
.fchip{font-size:11px;font-weight:600;color:var(--acc);padding:1px 9px;border-radius:10px;border:1.5px solid rgba(15,45,84,.28);background:var(--acc-bg);}
.fclear{background:none;border:1.5px solid rgba(15,45,84,.28);border-radius:4px;padding:2px 9px;font-size:10.5px;color:var(--acc);cursor:pointer;font-family:'Inter',sans-serif;font-weight:500;}
#body-wrap{display:flex;flex:1;min-height:0;overflow:hidden;}
#sidebar{width:var(--sw);min-width:var(--sw);background:var(--sur);border-right:1.5px solid var(--brd);display:flex;flex-direction:column;overflow-y:auto;flex-shrink:0;}
#sb-top{padding:12px 16px 10px;background:var(--acc);flex-shrink:0;display:flex;align-items:center;gap:10px;}
#mob-close-btn{display:none;align-items:center;justify-content:center;width:28px;height:28px;background:rgba(255,255,255,.15);border:none;border-radius:4px;color:#fff;font-size:15px;cursor:pointer;}
.sb-top-lbl{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:rgba(255,255,255,.55);}
#zeit-block{padding:13px 18px 11px;border-bottom:2px solid var(--brd);background:var(--sur2);flex-shrink:0;}
#file-filter-block{padding:14px 18px 12px;border-bottom:2px solid var(--brd);background:var(--sur2);flex-shrink:0;}
#file-filter-block .sb-lbl{margin-bottom:10px;}
.ff-btn{display:flex;align-items:center;gap:10px;width:100%;background:none;border:1.5px solid transparent;border-radius:7px;padding:9px 12px;font-family:'Inter',sans-serif;font-size:12.5px;color:var(--tx-mt);cursor:pointer;text-align:left;transition:background .15s,border-color .15s;color:var(--tx-mt);}
.ff-btn:hover{background:rgba(0,0,0,.04);}
.ff-btn.on{border-color:var(--acc);background:var(--acc-bg);color:var(--acc);}
.ff-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.ff-dot.pdf{background:var(--acc);}
.ff-dot.mp3{background:var(--now);}
.sb-lbl{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--tx-dim);margin-bottom:8px;}
.zb{display:flex;align-items:center;gap:8px;background:none;border:1.5px solid transparent;border-radius:5px;padding:7px 10px;font-family:'Inter',sans-serif;font-size:12.5px;color:var(--tx-mt);cursor:pointer;text-align:left;width:100%;margin-bottom:3px;}
.pip{width:8px;height:8px;border-radius:50%;flex-shrink:0;opacity:.3;}
.zb[data-z="alle"] .pip{background:var(--brd-dk);}.zb[data-z="vergangenheit"] .pip{background:var(--past);}.zb[data-z="gegenwart"] .pip{background:var(--now);}
.zb:hover{background:rgba(0,0,0,.04);color:var(--tx);}
.zb.on{border-color:var(--brd);background:var(--sur);color:var(--tx-mid);font-weight:500;}.zb.on .pip{opacity:1;}
.zb[data-z="vergangenheit"].on{background:var(--past-bg);border-color:var(--past-bd);color:var(--past);}
.zb[data-z="gegenwart"].on{background:var(--now-bg);border-color:var(--now-bd);color:var(--now);}
.ens-hdr-row{padding:11px 18px 6px;border-bottom:1px solid var(--brd);display:flex;align-items:center;justify-content:space-between;}
.ens-hdr-lbl{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--tx-dim);}
.alle-btn{background:none;border:1.5px solid var(--brd);border-radius:4px;padding:3px 9px;font-family:'Inter',sans-serif;font-size:10px;font-weight:600;color:var(--tx-mt);cursor:pointer;}
.alle-btn.on{background:var(--acc);border-color:var(--acc);color:#fff;}
#leit-block{border-bottom:2px solid var(--brd);flex-shrink:0;}
.leit-btn{display:flex;align-items:center;gap:6px;width:100%;background:none;border:none;padding:6px 16px 6px 12px;cursor:pointer;font-family:'Inter',sans-serif;font-size:12px;color:var(--tx-mid);text-align:left;border-left:3px solid transparent;border-bottom:1px solid rgba(0,0,0,.04);}
.leit-btn:hover{color:var(--tx);background:rgba(0,0,0,.03);}
.leit-btn.on{font-weight:600;color:var(--acc);border-left-color:var(--acc);background:var(--acc-bg);}
.leit-chk{width:13px;height:13px;margin-left:auto;border:1.5px solid var(--brd-dk);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:8px;color:transparent;}
.leit-btn.on .leit-chk{background:var(--acc);border-color:var(--acc);color:#fff;}
#ens-wrap{flex:1;overflow-y:auto;}
.ens-btn{display:flex;align-items:center;gap:8px;width:100%;background:none;border:none;padding:7px 16px 7px 12px;cursor:pointer;font-family:'Inter',sans-serif;font-size:12.5px;color:var(--tx-mid);text-align:left;border-left:3px solid transparent;border-bottom:1px solid rgba(0,0,0,.04);}
.ens-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.chk{width:14px;height:14px;margin-left:auto;border:1.5px solid var(--brd-dk);border-radius:3px;flex-shrink:0;display:flex;align-items:center;justify-content:center;font-size:9px;color:transparent;}
.ens-btn:hover{color:var(--tx);background:rgba(0,0,0,.03);}
.ens-btn.on{font-weight:600;}.ens-btn.on .chk{color:#fff;}
#main{flex:1;overflow-y:auto;min-width:0;display:flex;flex-direction:column;}
#vlist,#vdetail{display:flex;flex-direction:column;flex:1;}#vdetail{display:none;}
#lcontent{padding:26px 30px;max-width:1000px;}
/* LEGEND */
#legend{display:flex;align-items:center;gap:16px;flex-wrap:wrap;margin-bottom:18px;padding:9px 14px;background:var(--sur);border:1.5px solid var(--brd);border-radius:7px;font-size:11.5px;color:var(--tx-mt);}
.leg-lbl{font-weight:600;font-size:9.5px;letter-spacing:.14em;text-transform:uppercase;color:var(--tx-dim);flex-shrink:0;}
.leg-item{display:flex;align-items:center;gap:5px;white-space:nowrap;}
.leg-dot{width:10px;height:10px;border-radius:50%;flex-shrink:0;}
.leg-sq{width:10px;height:10px;border-radius:2px;flex-shrink:0;}
/* AKT */
.akt-h{display:flex;align-items:center;gap:14px;margin:32px 0 12px;}.akt-h:first-child{margin-top:0;}
.akt-rule{flex:1;height:1.5px;background:var(--brd);}
.akt-nm{font-family:'Cormorant Garamond',serif;font-size:20px;font-weight:700;font-style:italic;color:var(--tx-mt);white-space:nowrap;}
/* PAUSE */
.pause-block{display:flex;align-items:center;justify-content:center;margin:20px 0;border-radius:8px;overflow:hidden;background:linear-gradient(90deg,#c4923500 0%,#c49235bb 25%,#c49235bb 75%,#c4923500 100%);border:1.5px solid rgba(196,146,53,.4);min-height:52px;position:relative;}
.pause-block::before{content:'\2014';position:absolute;left:28px;font-size:14px;color:rgba(196,146,53,.45);}
.pause-block::after{content:'\2014';position:absolute;right:28px;font-size:14px;color:rgba(196,146,53,.45);}
.pause-inner{display:flex;align-items:center;padding:12px 60px;}
.pause-line{display:none;}.pause-badge{display:none;}
.pause-name{font-family:'Cormorant Garamond',serif;font-size:19px;font-style:italic;font-weight:600;color:#7a5c10;letter-spacing:.04em;}
.pause-block.greyed{opacity:.2;}
/* SCENE BLOCKS */
.hb{margin-bottom:5px;border:1.5px solid var(--brd);border-radius:7px;background:var(--sur);overflow:hidden;transition:opacity .15s,border-color .15s;}
.hb.greyed{opacity:.18;}.hb.hz{opacity:.15;}.hb.hidden-hb{display:none;}.hb.lit{border-color:var(--acc);border-left-width:4px;}
.hh{padding:10px 12px 10px 14px;transition:background .1s;}.hh:hover{background:var(--sur2);}
.hh-r1{display:flex;align-items:center;gap:10px;flex-wrap:wrap;}
.hh-r2{display:flex;flex-wrap:wrap;gap:4px;margin-top:6px;align-items:center;}.hh-r2:empty{display:none;}
.hnum{font-family:'Inconsolata',monospace;font-size:13px;font-weight:500;color:var(--acc);min-width:34px;flex-shrink:0;}
.hname{font-family:'Cormorant Garamond',serif;font-size:18px;font-weight:700;color:var(--tx);white-space:nowrap;overflow:hidden;text-overflow:ellipsis;cursor:pointer;flex:1;min-width:80px;}
.hname:hover{color:var(--acc);text-decoration:underline;text-underline-offset:3px;}
.zpill{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;padding:2px 8px;border-radius:10px;border:1.5px solid;flex-shrink:0;white-space:nowrap;}
.zpill.vergangenheit{color:var(--past);border-color:var(--past-bd);background:var(--past-bg);}
.zpill.gegenwart{color:var(--now);border-color:var(--now-bd);background:var(--now-bg);}
.leit-tag{font-family:'Inter',sans-serif;font-size:10px;font-weight:600;padding:2px 8px;border-radius:4px;white-space:nowrap;flex-shrink:0;color:var(--acc-lt);background:rgba(26,74,138,.08);border:1.5px solid rgba(26,74,138,.25);}
.leit-tag.leit-dim{opacity:.3;}
.leit-detail{font-size:12px;font-weight:500;color:var(--acc);background:var(--acc-bg);border:1.5px solid rgba(15,45,84,.2);border-radius:5px;padding:3px 10px;display:inline-flex;align-items:center;gap:4px;}
.arr{width:22px;height:22px;flex-shrink:0;display:flex;align-items:center;justify-content:center;color:var(--brd-dk);cursor:pointer;border-radius:4px;transition:transform .2s;}
.arr:hover{background:var(--sur2);}
.hb.open .marr{transform:rotate(90deg);}.ub.open .uarr{transform:rotate(90deg);}
.etag{font-family:'Inconsolata',monospace;font-size:10.5px;font-weight:500;padding:1px 7px;border-radius:4px;white-space:nowrap;border:1.5px solid;}
.etags{display:flex;flex-wrap:wrap;gap:4px;}
.file-badges{display:flex;gap:2px;margin-left:auto;flex-shrink:0;}
.fbadge{font-size:12px;line-height:1;opacity:.65;}
.fbadge-link{cursor:pointer;opacity:.7;transition:opacity .1s,transform .1s;}
.fbadge-link:hover{opacity:1;transform:scale(1.2);}
.ub .fbadge,.uur .fbadge{font-size:11px;}
.uc{border-top:1.5px solid var(--brd);background:#faf8f5;overflow:hidden;max-height:0;transition:max-height .3s ease;}
.hb.open .uc{max-height:8000px;}
.ub{border-bottom:1px solid rgba(0,0,0,.06);overflow:hidden;}.ub:last-child{border-bottom:none;}
.ub.hidden-ub{display:none;}.ub.greyed-ub{opacity:.2;}
.uh-r1{display:flex;align-items:center;gap:10px;padding:8px 12px 8px 20px;flex-wrap:wrap;}
.uh-r2{display:flex;flex-wrap:wrap;gap:4px;padding:0 12px 6px 20px;align-items:center;}.uh-r2:empty{display:none;}
.unum{font-family:'Inconsolata',monospace;font-size:11.5px;color:var(--tx-dim);min-width:44px;flex-shrink:0;}
.uname{flex:1;min-width:60px;font-family:'Cormorant Garamond',serif;font-size:16px;font-weight:500;color:var(--tx-mid);cursor:pointer;white-space:nowrap;overflow:hidden;text-overflow:ellipsis;}
.uname:hover{color:var(--acc);text-decoration:underline;}
.uuc{background:#f4f2ee;overflow:hidden;max-height:0;transition:max-height .25s ease;}
.ub.open .uuc{max-height:4000px;}
.uur{display:flex;flex-wrap:wrap;align-items:center;gap:8px;padding:7px 12px 7px 36px;border-bottom:1px solid rgba(0,0,0,.04);}
.uur:last-child{border-bottom:none;}.uur.hidden-uur{display:none;}.uur.greyed-uur{opacity:.2;}
.uurnum{font-family:'Inconsolata',monospace;font-size:10.5px;color:var(--tx-dim);min-width:54px;flex-shrink:0;}
.uurname{font-family:'Cormorant Garamond',serif;font-size:14.5px;color:var(--tx-mt);cursor:pointer;flex:1;}
.uurname:hover{color:var(--acc);text-decoration:underline;}
/* DETAIL */
#dcontent{padding:28px 32px;max-width:860px;}
.back-btn{display:inline-flex;align-items:center;gap:6px;background:none;border:1.5px solid var(--brd);border-radius:5px;padding:6px 13px;font-family:'Inter',sans-serif;font-size:11.5px;font-weight:500;color:var(--tx-mid);cursor:pointer;margin-bottom:22px;}
.back-btn:hover{border-color:var(--brd-dk);background:var(--sur2);}
.dheader{border-bottom:2px solid var(--brd);padding-bottom:16px;margin-bottom:22px;}
.dnum{font-family:'Inconsolata',monospace;font-size:13px;font-weight:500;color:var(--acc);margin-bottom:4px;}
.dtitle{font-family:'Cormorant Garamond',serif;font-size:36px;font-weight:700;font-style:italic;color:var(--tx);line-height:1.1;margin-bottom:8px;}
.sec-h{font-size:9px;font-weight:600;letter-spacing:.22em;text-transform:uppercase;color:var(--tx-dim);margin:24px 0 10px;}
.dsub{display:flex;align-items:center;gap:12px;padding:10px 14px;border:1.5px solid var(--brd);border-radius:6px;background:var(--sur);margin-bottom:5px;cursor:pointer;}
.dsub:hover{border-color:var(--acc);background:var(--acc-bg);}
.dsub-num{font-family:'Inconsolata',monospace;font-size:11.5px;color:var(--acc);min-width:48px;}
.dsub-name{font-family:'Cormorant Garamond',serif;font-size:15px;font-weight:500;color:var(--tx);flex:1;}
.file-card{border:1.5px solid var(--brd);border-radius:8px;background:var(--sur);overflow:hidden;margin-bottom:12px;}
.file-card-head{padding:11px 16px;border-bottom:1px solid var(--brd);background:var(--sur2);font-size:13px;font-weight:600;color:var(--tx);}
.file-card-body{padding:12px 16px;display:flex;flex-direction:column;gap:8px;}
.ntabs{display:flex;border-bottom:1.5px solid var(--brd);}
.ntab{flex:1;padding:8px 6px;background:var(--sur2);border:none;border-right:1px solid var(--brd);font-family:'Inter',sans-serif;font-size:11px;font-weight:600;color:var(--tx-mt);cursor:pointer;text-align:center;}
.ntab:last-child{border-right:none;}.ntab.on{background:var(--sur);color:var(--tx);}
.ntab-body{display:none;padding:10px 16px 14px;}.ntab-body.on{display:block;}
.file-list{display:flex;flex-direction:column;gap:4px;margin-bottom:4px;}
.file-row{display:flex;align-items:center;gap:8px;padding:7px 10px;border-radius:5px;background:var(--sur2);border:1px solid var(--brd);}
.file-nm{flex:1;font-size:12px;color:var(--tx-mid);overflow:hidden;text-overflow:ellipsis;white-space:nowrap;}
.file-row a{font-size:11px;color:var(--acc);text-decoration:none;font-weight:500;flex-shrink:0;}
.file-row a:hover{text-decoration:underline;}
.audio-item{border:1px solid var(--brd);border-radius:6px;background:var(--sur2);padding:8px 10px;margin-bottom:4px;}
.audio-top{display:flex;align-items:center;gap:6px;margin-bottom:6px;flex-wrap:wrap;}
.audio-nm{font-size:11.5px;font-weight:500;color:var(--tx-mid);flex:1;}
audio{width:100%;height:36px;border-radius:4px;display:block;}
.file-empty{font-size:12px;color:var(--tx-dim);padding:4px 0 8px;}
.dl-all-btn{display:inline-flex;align-items:center;gap:6px;background:var(--acc);border:none;border-radius:5px;padding:7px 14px;font-family:'Inter',sans-serif;font-size:11.5px;font-weight:600;color:#fff;cursor:pointer;margin-top:6px;transition:background .12s;}
.dl-all-btn:hover{background:var(--acc-lt);}
.dl-all-btn:disabled{opacity:.5;cursor:not-allowed;}
.dl-all-btn .dl-spin{width:12px;height:12px;border:2px solid rgba(255,255,255,.3);border-top-color:#fff;border-radius:50%;animation:spin .7s linear infinite;display:none;}
.dl-all-btn.loading .dl-spin{display:inline-block;}
.dl-all-btn.loading .dl-txt{display:none;}
#mob-overlay{display:none;position:fixed;inset:0;background:rgba(0,0,0,.45);z-index:29;}
#mob-overlay.on{display:block;}#mob-filter-btn{display:none;}
@media(max-width:860px){
  #sidebar{position:fixed;left:0;top:0;height:100%;transform:translateX(-100%);transition:transform .28s ease;z-index:30;box-shadow:4px 0 24px rgba(0,0,0,.2);}
  #sidebar.open{transform:translateX(0);}
  #mob-filter-btn{display:flex;align-items:center;gap:6px;background:rgba(255,255,255,.15);border:1px solid rgba(255,255,255,.25);border-radius:5px;padding:5px 11px;color:#fff;font-family:'Inter',sans-serif;font-size:11px;font-weight:600;cursor:pointer;}
  #mob-close-btn{display:flex;}
  #lcontent{padding:16px 14px 60px;}#dcontent{padding:16px 14px 60px;}
  .hname{white-space:normal;font-size:16px;line-height:1.3;}.uname{white-space:normal;font-size:14px;}.brand-sub{display:none;}
  #legend{gap:10px;font-size:11px;}
}
@media(max-width:520px){
  #sidebar{top:auto;bottom:0;width:100%;max-height:82dvh;border-radius:16px 16px 0 0;transform:translateY(100%);}
  #sidebar.open{transform:translateY(0);}
  .hb .zpill,.ub .zpill{display:none;}
  #lcontent{padding:12px 10px 80px;}#dcontent{padding:12px 10px 80px;}.dtitle{font-size:26px;}
}
::-webkit-scrollbar{width:5px;}::-webkit-scrollbar-thumb{background:var(--brd);border-radius:3px;}
</style>
<script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
</head>
<body>
<div id="mob-overlay" onclick="closeSB()"></div>
<div id="loader"><div class="spinner"></div><p id="loader-msg">Lade&hellip;</p></div>
<div id="topbar">
  <span class="brand" onclick="showList()" title="Zur &Uuml;bersicht">Thadden27</span>
  <span class="brand-sub">Besetzung</span>
  <span id="status">L&auml;dt&hellip;</span>
  <button class="tb ghost" id="btn-col" onclick="collapseAll(true)"  style="display:none">Einklappen</button>
  <button class="tb ghost" id="btn-exp" onclick="collapseAll(false)" style="display:none">Aufklappen</button>
  <button id="mob-filter-btn" onclick="openSB()">&#9776; Filter</button>
</div>
<div id="fbar">
  <div id="fbar-chips"></div>
  <button class="fclear" onclick="clearAllFilters()">&#10005; Zur&uuml;cksetzen</button>
</div>
<div id="body-wrap">
  <div id="sidebar">
    <div id="sb-top">
      <button id="mob-close-btn" onclick="closeSB()">&#10005;</button>
      <span class="sb-top-lbl">Filter</span>

function mkTags(cont,ens){var sh=ens.slice(0,6);for(var i=0;i<sh.length;i++){var e=sh[i];var c=S.colorMap[e]||PAL[0];var t=document.createElement('span');t.className='etag';t.textContent=e;t.style.background=c.bg;t.style.borderColor=c.bd;t.style.color=c.tx;if(!allSel())t.style.opacity=S.sel.indexOf(e)>=0?'1':'0.3';cont.appendChild(t);}if(ens.length>6){var m=document.createElement('span');m.className='etag';m.textContent='+'+(ens.length-6);m.style.background='var(--sur2)';m.style.borderColor='var(--brd)';m.style.color='var(--tx-mt)';cont.appendChild(m);}}

function findSc(id,nodes){for(var i=0;i<nodes.length;i++){if(nodes[i].id===id)return nodes[i];if(nodes[i].sub&&nodes[i].sub.length){var f=findSc(id,nodes[i].sub);if(f)return f;}}return null;}
function showDetail(id,noHistory){var sc=findSc(id,S.tree);if(!sc)return;_currentDetail=id;if(!noHistory)history.pushState({view:'detail',id:id},'',location.pathname+'?szene='+encodeURIComponent(id));document.getElementById('vlist').style.display='none';document.getElementById('vdetail').style.display='flex';document.getElementById('btn-col').style.display='none';document.getElementById('btn-exp').style.display='none';var dc=document.getElementById('dcontent');dc.innerHTML='';var back=document.createElement('button');back.className='back-btn';back.textContent='\u2190 Zur\xfcck';back.onclick=showList;dc.appendChild(back);var dh=document.createElement('div');dh.className='dheader';dh.innerHTML='<div class="dnum">Szene '+esc(sc.id)+'</div><div class="dtitle">'+esc(sc.name)+'</div>';var dmeta=document.createElement('div');dmeta.style.cssText='display:flex;gap:8px;align-items:center;flex-wrap:wrap;margin-top:6px;';if(sc.zeit&&sc.zeit!=='alle'){var pp=document.createElement('span');pp.className='zpill '+sc.zeit;pp.textContent=sc.zeit==='vergangenheit'?'Vergangenheit':'Gegenwart';dmeta.appendChild(pp);}if(sc.leitung){var dl=document.createElement('span');dl.className='leit-detail';dl.innerHTML='\u266a <strong>Mus. Leitung:</strong>\u00a0'+esc(sc.leitung);dmeta.appendChild(dl);}if(dmeta.children.length)dh.appendChild(dmeta);dc.appendChild(dh);if(sc.sub&&sc.sub.length){var sh=document.createElement('div');sh.className='sec-h';sh.textContent='Unterszenen';dc.appendChild(sh);for(var i=0;i<sc.sub.length;i++){var sub=sc.sub[i];var item=document.createElement('div');item.className='dsub';item.onclick=(function(id){return function(){showDetail(id);};})(sub.id);var sn=document.createElement('span');sn.className='dsub-num';sn.textContent=sub.id;item.appendChild(sn);var snm=document.createElement('span');snm.className='dsub-name';snm.textContent=sub.name;item.appendChild(snm);if(sub.leitung){var lt4=document.createElement('span');lt4.className='leit-tag';lt4.style.marginLeft='4px';lt4.textContent='\u266a\u00a0'+sub.leitung;item.appendChild(lt4);}var sarr=document.createElement('span');sarr.style.color='var(--tx-dim)';sarr.textContent=' \u203a';item.appendChild(sarr);dc.appendChild(item);}}if(sc.ensembles.length){var sh2=document.createElement('div');sh2.className='sec-h';sh2.textContent='Beteiligte Ensembles';dc.appendChild(sh2);var tg=document.createElement('div');tg.className='etags';tg.style.marginBottom='6px';mkTags(tg,sc.ensembles);dc.appendChild(tg);}dc.appendChild(mkFileSection(sc.id));}
function mkFileSection(sid){var wrap=document.createElement('div');wrap.id='files-section-'+sid;
var sh2=document.createElement('div');sh2.className='sec-h';sh2.textContent='Audio';wrap.appendChild(sh2);var card2=document.createElement('div');card2.className='file-card';var ch=document.createElement('div');ch.className='file-card-head';ch.textContent='\uD83C\uDFB5 Audiodateien';card2.appendChild(ch);var bod2=document.createElement('div');bod2.className='file-card-body';var mp3s=gf(sid).audio;if(mp3s.length){mp3s.forEach(function(m){var item=document.createElement('div');item.className='audio-item';var top=document.createElement('div');top.className='audio-top';var nm=document.createElement('span');nm.className='audio-nm';nm.textContent=m.name;top.appendChild(nm);var dl=document.createElement('a');dl.href=m.url;dl.setAttribute('download',m.name);dl.target='_blank';dl.style.cssText='font-size:10.5px;color:var(--acc);text-decoration:none;font-weight:500;';dl.textContent='\u2193 Download';top.appendChild(dl);item.appendChild(top);var pl=document.createElement('audio');
pl.controls=true;
pl.preload='metadata';
var ext=(m.url.split('?')[0].split('.').pop()||'mp3').toLowerCase();
var mimes={'mp3':'audio/mpeg','ogg':'audio/ogg','wav':'audio/wav','m4a':'audio/mp4','aac':'audio/aac'};
// Use <source> for proper MIME type support
var src=document.createElement('source');
src.src=m.url;
src.type=mimes[ext]||'audio/mpeg';
pl.appendChild(src);
// Fallback: direct link if player fails
var fb=document.createElement('div');
fb.style.cssText='font-size:10px;color:var(--tx-dim);margin-top:3px;';
fb.innerHTML='Wenn der Player nicht lädt: <a href="'+m.url+'" target="_blank" style="color:var(--acc)">direkt öffnen</a>';
item.appendChild(pl);
item.appendChild(fb);
bod2.appendChild(item);});}else{var em2=document.createElement('div');em2.className='file-empty';em2.textContent='Noch keine Audiodateien.';bod2.appendChild(em2);}card2.appendChild(bod2);wrap.appendChild(card2);
var sh=document.createElement('div');sh.className='sec-h';sh.textContent='Noten (PDF)';wrap.appendChild(sh);
var card=document.createElement('div');card.className='file-card';
var bod=document.createElement('div');bod.className='file-card-body';
var pdfs=gf(sid).noten;
var list=document.createElement('div');list.className='file-list';
if(pdfs.length){
  pdfs.forEach(function(p){
    var row=document.createElement('div');row.className='file-row';
    row.innerHTML='<span>\uD83D\uDCC4</span>';
    var nm=document.createElement('span');nm.className='file-nm';nm.textContent=p.name;row.appendChild(nm);
    var a=document.createElement('a');a.href=p.url;a.target='_blank';a.textContent='\u2193 \xd6ffnen';row.appendChild(a);
    list.appendChild(row);
  });
}else{var em=document.createElement('div');em.className='file-empty';em.textContent='Noch keine Noten.';list.appendChild(em);}
bod.appendChild(list);
// Download-all button (only if multiple PDFs)
if(pdfs.length>0){
  var dlBtn=document.createElement('button');
  dlBtn.className='dl-all-btn';
  dlBtn.innerHTML='<span class="dl-spin"></span><span class="dl-txt">&#8595; Alle als ZIP</span>';
  dlBtn.title='Alle Noten als ZIP-Datei herunterladen';
  dlBtn.onclick=(function(pdfList,sceneId){return function(){
    var btn=this;
    btn.classList.add('loading');
    btn.disabled=true;
    var zip=new JSZip();
    var folder=zip.folder('Noten '+sceneId);
    var fetches=pdfList.map(function(p){
      return fetch(p.url)
        .then(function(r){if(!r.ok)throw new Error(r.status);return r.arrayBuffer();})
        .then(function(buf){folder.file(p.name,buf);})
        .catch(function(e){console.warn('ZIP: could not fetch',p.name,e);});
    });
    Promise.all(fetches).then(function(){
      return zip.generateAsync({type:'blob'});
    }).then(function(blob){
      var a=document.createElement('a');
      a.href=URL.createObjectURL(blob);
      a.download='Noten '+sceneId+'.zip';
      document.body.appendChild(a);a.click();
      setTimeout(function(){document.body.removeChild(a);URL.revokeObjectURL(a.href);},1000);
      btn.classList.remove('loading');btn.disabled=false;
    }).catch(function(e){
      alert('ZIP konnte nicht erstellt werden: '+e.message);
      btn.classList.remove('loading');btn.disabled=false;
    });
  };})(pdfs,sid);
  bod.appendChild(dlBtn);
}
card.appendChild(bod);wrap.appendChild(card);
return wrap;}
